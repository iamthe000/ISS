<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>統合戦略シミュレーター</title>
    <link rel="stylesheet" href="src/style.css">
</head>
<body>

<div id="setup-screen">
    <h1 style="font-size: 2em; color: var(--accent-gold); text-shadow: 0 0 10px rgba(255,193,7,0.5); margin-bottom: 10px;">統合戦略シミュレーター</h1>
    <p style="font-size: 0.9em; margin-bottom: 20px;">世界線のマップを読み込み、指揮を執る国家を選択してください。</p>
    
    <div style="margin: 10px 0;">
        <input type="file" id="mapUpload" accept=".json" style="display:none;">
        <button onclick="document.getElementById('mapUpload').click()" class="primary" style="font-size: 1.1em; padding: 10px 20px;">🗺️ マップファイルを手動読込</button>
    </div>
    
    <div id="setup-country-list" style="display: flex; flex-wrap: wrap; justify-content: center; max-width: 100%; max-height: 50vh; overflow-y: auto;">
    </div>
</div>

<div id="game-layout">
    <div id="left-panel">
        <div class="section" style="padding-bottom: 10px;">
            <h2 id="ui-country-name" style="margin-bottom: 5px; font-size: 1.2em;">国家名</h2>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button class="primary" style="flex: 1; padding: 10px 5px;" onclick="ui.openTechTree()">🔬 技術研究</button>
                <button id="btn-auto-recruit" class="gold" style="flex: 1; padding: 10px 5px;" onclick="game.toggleAutoRecruit()">⚔️ 自動徴兵: ON</button>
            </div>
            <p class="text-muted" style="font-size: 0.7em; margin-top: 5px;">※自動徴兵ON時、毎月IC10と人的資源1000で自動編成</p>
        </div>

        <div class="section" style="flex: 1; overflow-y: auto; padding-top: 10px;">
            <div class="flex-row">
                <h3 style="margin:0;">前線司令部</h3>
                <button onclick="game.createArmyGroup()" class="primary" style="padding: 4px 15px; font-size:1.1em; font-weight:bold;">+ 新設</button>
            </div>
            <div id="army-list-container" style="margin-top: 15px;">
            </div>
        </div>

        <div class="section" id="tile-info-panel" style="background: #15151a; padding: 10px 15px;">
            <div id="ti-placeholder" class="text-muted" style="font-size: 0.8em; text-align: center;">タイルをタップして情報表示</div>
            <div id="tile-info-content" style="display: none;">
                <div class="flex-row" style="margin-bottom: 4px;">
                    <strong id="ti-owner" style="font-size: 1.1em;"></strong>
                    <span id="ti-coords" style="color: #666; font-family: monospace; font-size: 0.9em;"></span>
                </div>
                <div style="display: flex; justify-content: space-between; font-size: 0.85em;">
                    <span>🏭IC: <span id="ti-ic" class="text-gold"></span></span>
                    <span>👥人的: <span id="ti-manpower" class="text-blue"></span></span>
                    <span>🏰要塞: <span id="ti-fort"></span></span>
                    <span>🛡️師団: <span id="ti-units" class="text-green" style="font-weight:bold;"></span></span>
                </div>
            </div>
        </div>
    </div>

    <div id="main-area">
        <div id="top-bar">
            <div style="display: flex; gap: 8px; align-items: center;">
                <div class="stat-box" style="min-width: 70px;">
                    <span class="stat-label">時間</span>
                    <span class="stat-value" id="top-date" style="font-size: 0.85em;">1936. 1. 1</span>
                </div>
                
                <div class="stat-box" style="flex-direction: row; gap: 5px; min-width: 90px;">
                    <span class="stat-label" style="margin-right: 2px;">速度</span>
                    <input type="range" id="speed-slider" min="1" max="5" value="3" onchange="game.changeSpeed(this.value)" style="width: 50px;">
                    <span class="stat-value" id="speed-display" style="font-size: 1em; width: 12px;">3</span>
                </div>

                <button id="btn-pause" onclick="game.togglePause()" class="primary" style="font-weight: bold; padding: 6px 10px;">▶️ 再開</button>
            </div>
            
            <div style="display: flex; gap: 8px;">
                <div class="stat-box">
                    <span class="stat-label">IC</span>
                    <span class="stat-value text-gold" id="top-ic">0</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">人的資源</span>
                    <span class="stat-value text-blue" id="top-manpower">0</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">師団(予備/総)</span>
                    <span class="stat-value text-green"><span id="top-reserve-divisions">0</span> / <span id="top-total-divisions">0</span></span>
                </div>
            </div>
        </div>

        <div id="operation-banner" onclick="ui.cancelDrawingMode()">
        </div>

        <div id="map-container">
            <canvas id="gameCanvas"></canvas>
        </div>

        <div id="log-panel"></div>
    </div>
</div>

<div id="tech-modal">
    <div id="tech-content">
        <div id="tech-header">
            <div class="tech-tabs">
                <div class="tech-tab active" onclick="ui.switchTechTab('infantry')">歩兵・装備</div>
                <div class="tech-tab" onclick="ui.switchTechTab('industry')">産業・工学</div>
                <div class="tech-tab" onclick="ui.switchTechTab('navy')">海軍</div>
                <div class="tech-tab" onclick="ui.switchTechTab('doctrine')">ドクトリン</div>
            </div>
            <div style="display: flex; align-items: center; gap: 15px;">
                <div>研究力: <span class="text-gold" id="tech-ic-display"></span> IC</div>
                <button class="danger" onclick="ui.closeTechTree()">閉じる ✕</button>
            </div>
        </div>
        <div id="tech-tree-view">
            <svg id="tech-lines"></svg>
            <div id="tech-nodes-container" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;"></div>
        </div>
    </div>
</div>

<script src="src/script.js"></script>
</body>
</html>
